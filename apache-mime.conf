<IfModule mod_mime.c>
    AddType text/html .html .htm
    AddType application/javascript .js
    AddType text/css .css
    AddType application/json .json
    AddType image/svg+xml .svg
    AddType font/woff2 .woff2
    AddType font/woff .woff
    AddType video/mp4 .mp4
    AddType video/webm .webm
</IfModule>

<IfModule mod_headers.c>
    <LocationMatch "^/remote\.php/dav/files/.*\.(html|htm)$">
        Header always unset Content-Security-Policy
        Header always set Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval' blob: data:; script-src * 'unsafe-inline' 'unsafe-eval' blob: data:; style-src * 'unsafe-inline' blob: data:; img-src * blob: data:; media-src * blob: data:; font-src * blob: data:; connect-src * blob: data:; frame-src * blob: data:; frame-ancestors 'self'; object-src * blob: data:; worker-src * blob: data:;"
        Header always set X-Frame-Options "SAMEORIGIN"
    </LocationMatch>

    <LocationMatch "^/(index\.php/)?(apps/files|f/)">
        Header always unset Content-Security-Policy
        Header always set Content-Security-Policy "default-src 'self' blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:; style-src 'self' 'unsafe-inline' blob: data:; img-src 'self' blob: data: *; media-src 'self' blob: data: *; font-src 'self' blob: data: *; connect-src 'self' blob: data: *; frame-src 'self' blob: data: *; frame-ancestors 'self'; object-src 'self' blob: data:; worker-src 'self' blob: data:;"
    </LocationMatch>
</IfModule>