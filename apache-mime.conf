# mime-fix.conf
# 修复 Nextcloud HTML 预览的 MIME 类型和 CSP 问题
# 本文件合并了 mime-fix 和 csp-override 两个功能

<IfModule mod_mime.c>
    AddType text/html .html .htm
    AddType application/javascript .js
    AddType text/css .css
    AddType application/json .json
    AddType image/svg+xml .svg
    AddType font/woff2 .woff2
    AddType font/woff .woff
    AddType video/mp4 .mp4
    AddType video/webm .webm
</IfModule>

<IfModule mod_headers.c>

    # -------------------------------------------------------
    # 全局 Nextcloud 页面：修复 CSP 允许 blob: data:
    # 覆盖 Nextcloud PHP 层生成的 CSP，增加 blob: data: 支持
    # -------------------------------------------------------

    # 对 WebDAV 文件访问路径（HTML 插件通过此路径加载文件内容）
    <LocationMatch "^/remote\.php/dav/files/.*\.(html|htm)$">
        Header always set Content-Security-Policy \
            "default-src * 'unsafe-inline' 'unsafe-eval' blob: data:; \
             script-src * 'unsafe-inline' 'unsafe-eval' blob: data:; \
             style-src * 'unsafe-inline' blob: data:; \
             img-src * blob: data:; \
             media-src * blob: data:; \
             font-src * blob: data:; \
             connect-src * blob: data:; \
             frame-src * blob: data:; \
             frame-ancestors 'self'; \
             object-src * blob: data:; \
             worker-src * blob: data:;"
        Header always set X-Frame-Options "SAMEORIGIN"
    </LocationMatch>

    # 对 Nextcloud 文件预览 UI 页面（viewer 的宿主页面）
    <LocationMatch "^/(index\.php/)?(apps/files|f/)">
        Header always set Content-Security-Policy \
            "default-src 'self' blob: data:; \
             script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:; \
             style-src 'self' 'unsafe-inline' blob: data:; \
             img-src 'self' blob: data: *; \
             media-src 'self' blob: data: *; \
             font-src 'self' blob: data: *; \
             connect-src 'self' blob: data: *; \
             frame-src 'self' blob: data: *; \
             frame-ancestors 'self'; \
             object-src 'self' blob: data:; \
             worker-src 'self' blob: data:;"
    </LocationMatch>

</IfModule>