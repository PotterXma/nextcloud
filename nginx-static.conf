server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 允许跨域（Nextcloud iframe 需要）
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";

    location / {
        try_files $uri $uri/ =404;

        # 正确的 MIME 类型
        types {
            text/html                   html htm;
            text/css                    css;
            application/javascript      js;
            image/jpeg                  jpg jpeg;
            image/png                   png;
            image/webp                  webp;
            image/gif                   gif;
            image/svg+xml               svg;
            font/woff                   woff;
            font/woff2                  woff2;
            video/mp4                   mp4;
        }
    }

    # 关闭访问日志减少 IO
    access_log off;
}