services:
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: always
    # 勿在 command 折叠块内写 # 注释：会原样传给 mariadbd 导致启动失败
    # skip-name-resolve：连接阶段不做客户端主机名反向解析
    command: >
      --transaction-isolation=READ-COMMITTED
      --log-bin=binlog
      --binlog-format=ROW
      --expire-logs-days=3
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --query-cache-type=0
      --max-connections=100
      --skip-name-resolve
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # 修改为强密码
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD} # 修改为强密码
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - nextcloud_net

  redis:
    image: redis:7-alpine
    container_name: nextcloud_redis
    restart: always
    # 纯缓存用途：关 RDB/AOF 持久化，减轻磁盘 I/O 与 fork 时的 CPU 尖峰
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - nextcloud_net

  app:
    image: nextcloud:33
    container_name: nextcloud_app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      # 数据库
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD} # 与上方保持一致

      # 管理员账号
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD} # 修改为强密码

      # 对外访问域名与 URL（见根目录 .env）
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}

      OVERWRITEPROTOCOL: ${NEXTCLOUD_OVERWRITE_PROTOCOL}
      OVERWRITEHOST: ${NEXTCLOUD_OVERWRITE_HOST}
      # 官方镜像 reverse-proxy.config.php 读取的环境变量名（无下划线）
      OVERWRITECLIURL: ${NEXTCLOUD_PUBLIC_URL}

      # Redis 缓存
      REDIS_HOST: redis

      # PHP 性能
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 10G

      # PHP OPcache 优化
      # revalidate_freq=60：生产环境每 60 秒才做一次文件 stat() 检查，
      # 避免每个请求都触发大量 inotify/stat 系统调用拖慢 CPU。
      # 若手动更新了应用，执行 docker exec nextcloud_app kill -USR2 1 或重启容器使缓存失效。
      PHP_OPCACHE_ENABLE: "1"
      PHP_OPCACHE_MEMORY_CONSUMPTION: "128"
      PHP_OPCACHE_MAX_ACCELERATED_FILES: "10000"
      PHP_OPCACHE_REVALIDATE_FREQ: "60"
      PHP_OPCACHE_INTERNED_STRINGS_BUFFER: "16"
      PHP_OPCACHE_SAVE_COMMENTS: "1"

    volumes:
      - nextcloud_data:/var/www/html
      # 预览生成限制（只读）
      - ./config/preview.config.php:/var/www/html/config/preview.config.php:ro
      # 后台任务窗口 + 数据保留策略（只读）
      - ./config/performance.config.php:/var/www/html/config/performance.config.php:ro
      # Apache MPM Prefork 并发限制 — 官方镜像 entrypoint 不读 APACHE_MAX_REQUEST_WORKERS 环境变量，
      # 必须直接覆盖此 conf 文件才能生效。
      - ./config/apache-mpm-prefork.conf:/etc/apache2/mods-available/mpm_prefork.conf:ro
      # 本地 APCu：与 Redis 搭配，减少元数据/路径缓存命中数据库（官方镜像已带 APCu）
      - ./config/apcu.config.php:/var/www/html/config/apcu.config.php:ro
      # PHP：会话进 Redis + realpath 缓存（镜像 PHP_INI_DIR 见官方 Dockerfile）
      - ./config/php-redis-session.ini:/usr/local/etc/php/conf.d/zz-redis-session.ini:ro
    networks:
      - nextcloud_net

  # ── Cron 容器（关键优化）──────────────────────────────────────────────────
  # 使用独立容器每 5 分钟执行一次 cron.php，把所有后台任务（文件索引、
  # 活动扫描、预览生成队列等）从 HTTP 请求路径中剥离，消除"用几下 CPU 就爆"。
  # 首次部署后还需执行：
  #   docker exec -u www-data nextcloud_app php occ background:cron
  # 告知 Nextcloud 切换到 cron 模式（而非默认的 AJAX 模式）。
  cron:
    image: nextcloud:33
    container_name: nextcloud_cron
    restart: always
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      PHP_MEMORY_LIMIT: 512M
    volumes:
      - nextcloud_data:/var/www/html
      - ./config/preview.config.php:/var/www/html/config/preview.config.php:ro
      - ./config/performance.config.php:/var/www/html/config/performance.config.php:ro
      - ./config/apcu.config.php:/var/www/html/config/apcu.config.php:ro
    networks:
      - nextcloud_net

volumes:
  db_data:
  nextcloud_data:


networks:
  nextcloud_net:
    driver: bridge
