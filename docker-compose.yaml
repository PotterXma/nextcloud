services:
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # 修改为强密码
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD} # 修改为强密码
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - nextcloud_net

  redis:
    image: redis:7-alpine
    container_name: nextcloud_redis
    restart: always
    networks:
      - nextcloud_net

  app:
    image: nextcloud:33
    container_name: nextcloud_app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      # 数据库
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD} # 与上方保持一致

      # 管理员账号
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD} # 修改为强密码

      # 对外访问域名（与浏览器地址栏一致，默认见 .env）
      NEXTCLOUD_TRUSTED_DOMAINS: http://test.neweggbox.com

      # 直连 HTTP（无前一层 LB / HTTPS），容器对外映射宿主机 80→容器 80
      OVERWRITEPROTOCOL: http
      OVERWRITEHOST: http://test.neweggbox.com
      # 官方镜像 reverse-proxy.config.php 读取的环境变量名（无下划线）
      OVERWRITECLIURL: http://test.neweggbox.com

      # Redis 缓存
      REDIS_HOST: redis

      # PHP 性能
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 10G

    volumes:
      - nextcloud_data:/var/www/html
      # 勿把 core 文件 bind-mount 到 /var/www/html 下：官方入口会用 rsync 同步程序到卷，挂载点会报 Device busy 导致启动失败。
    networks:
      - nextcloud_net

volumes:
  db_data:
  nextcloud_data:


networks:
  nextcloud_net:
    driver: bridge
