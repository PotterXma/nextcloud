# 镜像标签：升级前请在测试环境验证；生产可用 digest 固定构建产物。
services:
  db:
    image: mariadb:10.11
    container_name: nextcloud_db
    restart: always
    # 勿在 command 折叠块内写 # 注释：会原样传给 mariadbd 导致启动失败
    # skip-name-resolve：连接阶段不做客户端主机名反向解析
    command: >
      --transaction-isolation=READ-COMMITTED
      --log-bin=binlog
      --binlog-format=ROW
      --expire-logs-days=3
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --query-cache-type=0
      --max-connections=100
      --skip-name-resolve
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # 修改为强密码
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD} # 修改为强密码
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - nextcloud_net

  redis:
    image: redis:7-alpine
    container_name: nextcloud_redis
    restart: always
    env_file:
      - .env
    environment:
      # 可选覆盖 maxmemory，如 512mb、1gb（.env 中设 REDIS_MAXMEMORY=...）
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-256mb}
    # 口令与 Nextcloud REDIS_HOST_PASSWORD 一致（空则等同无认证，仅内网可接受）
    volumes:
      - ./config/redis-command.sh:/redis-command.sh:ro
    command: ["/bin/sh", "/redis-command.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_HOST_PASSWORD" ]; then redis-cli -a "$$REDIS_HOST_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - nextcloud_net

  app:
    image: nextcloud:33
    container_name: nextcloud_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # 数据库
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD} # 与上方保持一致

      # 仅首次自动安装需要；安装完成后可从 compose 中删除或置空，避免口令长期留在编排里
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}

      # 对外访问域名与 URL（见根目录 .env）
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}

      OVERWRITEPROTOCOL: ${NEXTCLOUD_OVERWRITE_PROTOCOL}
      OVERWRITEHOST: ${NEXTCLOUD_OVERWRITE_HOST}
      # 官方镜像 reverse-proxy.config.php 读取的环境变量名（无下划线）
      OVERWRITECLIURL: ${NEXTCLOUD_PUBLIC_URL}

      # 信任反代来源；可在 .env 中设置 TRUSTED_PROXIES 收紧（空格分隔 CIDR/ IP）
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-"127.0.0.1 172.16.0.0/12 10.0.0.0/8"}

      # Redis 缓存
      REDIS_HOST: redis

      # 预览用 ImageMagick 时默认会开多线程，单张图即可占满多核；限 1 线程可明显压低
      # 「单用户传图 CPU 40%+」的尖峰（总时长略增）。Cron 见下方同名变量。
      MAGICK_THREAD_LIMIT: "1"
      OMP_NUM_THREADS: "1"

      # PHP 性能
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 10G

      # PHP OPcache 优化
      # revalidate_freq=60：生产环境每 60 秒才做一次文件 stat() 检查，
      # 避免每个请求都触发大量 inotify/stat 系统调用拖慢 CPU。
      # 若手动更新了应用，执行 docker exec nextcloud_app kill -USR2 1 或重启容器使缓存失效。
      PHP_OPCACHE_ENABLE: "1"
      PHP_OPCACHE_MEMORY_CONSUMPTION: "128"
      PHP_OPCACHE_MAX_ACCELERATED_FILES: "10000"
      PHP_OPCACHE_REVALIDATE_FREQ: "60"
      PHP_OPCACHE_INTERNED_STRINGS_BUFFER: "16"
      PHP_OPCACHE_SAVE_COMMENTS: "1"

    volumes:
      - nextcloud_data:/var/www/html
      # 预览生成限制（只读）
      - ./config/preview.config.php:/var/www/html/config/preview.config.php:ro
      # 后台任务窗口 + 数据保留策略（只读）
      - ./config/performance.config.php:/var/www/html/config/performance.config.php:ro
      # Apache MPM Prefork 并发限制 — 官方镜像 entrypoint 不读 APACHE_MAX_REQUEST_WORKERS 环境变量，
      # 必须直接覆盖此 conf 文件才能生效。
      - ./config/apache-mpm-prefork.conf:/etc/apache2/mods-available/mpm_prefork.conf:ro
      # 本地 APCu：与 Redis 搭配，减少元数据/路径缓存命中数据库（官方镜像已带 APCu）
      - ./config/apcu.config.php:/var/www/html/config/apcu.config.php:ro
      # realpath 缓存；会话由镜像 entrypoint 根据 REDIS_HOST / REDIS_HOST_PASSWORD 写入 redis-session.ini
      - ./config/php-realpath.ini:/usr/local/etc/php/conf.d/zz-realpath.ini:ro
    healthcheck:
      # 镜像内通常带 curl；若无请改为 php -r 访问 http://127.0.0.1/
      test:
        ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1/ || wget -q --spider http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - nextcloud_net

  # ── Nginx 反代（对外 80 → app:80）：上传缓冲、gzip、转发真实 IP ─────────────
  web:
    image: nginx:1.27-alpine
    container_name: nextcloud_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nextcloud_net

  # ── Cron 容器（关键优化）──────────────────────────────────────────────────
  # 使用独立容器每 5 分钟执行一次 cron.php，把所有后台任务（文件索引、
  # 活动扫描、预览生成队列等）从 HTTP 请求路径中剥离，消除"用几下 CPU 就爆"。
  # 首次部署后还需执行：
  #   docker exec -u www-data nextcloud_app php occ background:cron
  # 告知 Nextcloud 切换到 cron 模式（而非默认的 AJAX 模式）。
  cron:
    image: nextcloud:33
    container_name: nextcloud_cron
    restart: always
    entrypoint: /cron.sh
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      PHP_MEMORY_LIMIT: 512M
      MAGICK_THREAD_LIMIT: "1"
      OMP_NUM_THREADS: "1"
    volumes:
      - nextcloud_data:/var/www/html
      - ./config/preview.config.php:/var/www/html/config/preview.config.php:ro
      - ./config/performance.config.php:/var/www/html/config/performance.config.php:ro
      - ./config/apcu.config.php:/var/www/html/config/apcu.config.php:ro
    networks:
      - nextcloud_net

volumes:
  db_data:
  nextcloud_data:


networks:
  nextcloud_net:
    driver: bridge
