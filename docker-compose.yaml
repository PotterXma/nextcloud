version: '3.8'

services:
  db:
    image: a.newegg.org/newegg-docker/mariadb:10.11
    container_name: nextcloud_db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: next@cloud@123!   # 修改为强密码
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcl0ud@newegg@456!          # 修改为强密码
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - nextcloud_net

  redis:
    image: a.newegg.org/newegg-docker/redis:7-alpine
    container_name: nextcloud_redis
    restart: always
    networks:
      - nextcloud_net

  app:
    image: a.newegg.org/newegg-docker/nextcloud:latest
    container_name: nextcloud_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
      - redis
    environment:
      # 数据库
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcl0ud@newegg@456!          # 与上方保持一致

      # 管理员账号
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin@nextcl0ud@123!  # 修改为强密码

      # 信任的域名（LB 对外域名）
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.newegg.org

      # LB 终止 HTTPS 所需配置
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: nextcloud.newegg.org
      OVERWRITE_CLI_URL: https://nextcloud.newegg.org
      TRUSTED_PROXIES: 172.16.0.0/12            # 修改为 LB 的 IP 或网段

      # Redis 缓存
      REDIS_HOST: redis

      # PHP 性能
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 10G

    volumes:
      - nextcloud_data:/var/www/html
      - ./config:/var/www/html/config
      - ./custom_apps:/var/www/html/custom_apps
      - /nextcloud-data:/var/www/html/data
    networks:
      - nextcloud_net

  cron:
    image: a.newegg.org/newegg-docker/nextcloud:latest
    container_name: nextcloud_cron
    restart: always
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis
    volumes:
      - nextcloud_data:/var/www/html
      - ./config:/var/www/html/config
      - ./custom_apps:/var/www/html/custom_apps
      - /nextcloud-data:/var/www/html/data
    networks:
      - nextcloud_net

volumes:
  db_data:
  nextcloud_data:

networks:
  nextcloud_net:
    driver: bridge
