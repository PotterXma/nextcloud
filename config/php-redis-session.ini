; 挂载到 app 容器：/usr/local/etc/php/conf.d/zz-redis-session.ini
;
; 1) 会话存 Redis：Prefork 下多 PHP 进程时，避免在 data 目录高频读写 session 文件（降 I/O）。
;    若 Redis 不可用，用户需重新登录；仅对 Web 请求生效。
; 2) realpath 缓存：减轻大量 PHP 文件路径解析时的 stat 调用（与 OPcache 互补）。

session.save_handler = redis
session.save_path = "tcp://redis:6379"
session.gc_maxlifetime = 86400

realpath_cache_size = 4096K
realpath_cache_ttl = 600
