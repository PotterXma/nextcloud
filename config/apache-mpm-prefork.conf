# Apache2 MPM Prefork 并发控制
#
# 官方 nextcloud:33 镜像 entrypoint 不读取 APACHE_MAX_REQUEST_WORKERS 环境变量，
# 必须通过此文件直接覆盖 mpm_prefork 的默认配置。
#
# 挂载路径（docker-compose.yaml 中已配置）：
#   ./config/apache-mpm-prefork.conf:/etc/apache2/mods-available/mpm_prefork.conf:ro
#
# 参数说明（针对 c2-standard-4：4 vCPU / 16 GB RAM）：
#   - MaxRequestWorkers 8：最多同时处理 8 个 HTTP 请求（每个请求一个 PHP 进程）
#     4 vCPU × 2 = 8 是合理起点，确保每个 worker 有足够 CPU 时间片。
#     实际并发用户多时可调高到 12；若 CPU 仍高可降到 6。
#   - MaxConnectionsPerChild 500：每个 worker 进程最多处理 500 个请求后自动重启，
#     防止长时间运行的 PHP 进程内存泄漏积累。
#   - MinSpareServers/MaxSpareServers：空闲 worker 保持在 2~4 个，快速响应突发请求
#     同时不占用多余 CPU。

<IfModule mpm_prefork_module>
    StartServers              2
    MinSpareServers           2
    MaxSpareServers           4
    MaxRequestWorkers         8
    MaxConnectionsPerChild  500
</IfModule>
