# Nextcloud 前置反代（对外 80 → app:80）
# 前置 HTTPS 负载均衡时通常会传入 X-Forwarded-Proto / X-Forwarded-Port；
# 直连访问无则回退为当前连接的 $scheme / $server_port。
# Nextcloud 是否采信这些头由应用侧 trusted_proxies 控制。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_x_forwarded_proto $nc_forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

map $http_x_forwarded_port $nc_forwarded_port {
    ""      $server_port;
    default $http_x_forwarded_port;
}

upstream nextcloud_backend {
    server app:80;
}

server {
    listen 80;
    server_name _;

    server_tokens off;

    client_max_body_size 10G;
    client_body_timeout 3600s;
    send_timeout 3600s;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $nc_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $nc_forwarded_port;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    # 大文件上传：流式转发，避免 Nginx 先把整包缓存在内存/磁盘
    proxy_buffering off;
    proxy_request_buffering off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    location / {
        proxy_pass http://nextcloud_backend;
    }
}
